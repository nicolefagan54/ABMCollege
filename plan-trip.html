<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Your Trip - Visit Denmark</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Plan Your Trip</h1>
  <p>Let us help you organize your Danish adventure.</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
  <a href="plan-trip.html">Plan Trip</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
  <div class="flag-accent"></div>
  <h2>Trip Planner Request</h2>
  <p>Fill out the details of your dream trip, and we will send you a personalized itinerary suggestion!</p>
  
  <form action="#" method="get">
    <label for="travelers">Number of Travelers</label>
    <input type="number" id="travelers" name="travelers" min="1" max="20" placeholder="e.g. 2" required>
    
    <label for="duration">Trip Duration (Days)</label>
    <input type="number" id="duration" name="duration" min="1" max="90" placeholder="e.g. 7" required>
    
    <label for="interest">Primary Interest</label>
    <select id="interest" name="interest">
      <option value="culture">Culture & History</option>
      <option value="food">Food & Dining</option>
      <option value="nature">Nature & Outdoors</option>
      <option value="family">Family Activities</option>
    </select>
    
    <label for="budget">Estimated Budget</label>
    <select id="budget" name="budget">
      <option value="budget">Budget Friendly (Hostels, street food)</option>
      <option value="mid">Mid-Range (Hotels, nice dinners)</option>
      <option value="luxury">Luxury (5-star, fine dining)</option>
    </select>
    
    <label for="notes">Additional Notes</label>
    <textarea id="notes" name="notes" rows="4" placeholder="Any specific cities or attractions you must see?"></textarea>
    
    <button type="submit">Request Itinerary</button>
  </form>
</section>

<footer>
  <p>© 2026 Visit Denmark — Educational Sample Website with Denmark Flag Colors</p>
</footer>

</body>
</html>
